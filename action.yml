name: FIT Bootstrap
description: >
  Opinionated FIT environment bootstrap. Sets up Bun, restores a single
  environment cache (CLI tools in ~/.local + node_modules + generated),
  installs anything missing, optionally checks out the GitHub wiki, and runs
  ./scripts/bootstrap.sh. To push the wiki back, run forwardimpact/fit-wiki@v1
  after the agent step.

inputs:
  token:
    description: >
      GitHub token with read access to the wiki. When provided, the wiki is
      checked out into ./wiki. Leave blank to skip wiki checkout entirely.
      Pushing the wiki back is the caller's responsibility — see
      forwardimpact/fit-wiki@v1.
    required: false
    default: ""
  app-slug:
    description: >
      GitHub App slug for git identity (e.g. kata-agent-team). When
      provided with app-id, sets git identity to the app bot account
      instead of the generic github-actions bot.
    required: false
    default: ""
  app-id:
    description: >
      GitHub App ID for git identity email. Used together with app-slug.
    required: false
    default: ""
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.11"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}
        no-cache: false

    - name: Configure git identity
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        APP_ID: ${{ inputs.app-id }}
      run: |
        if [ -n "$APP_SLUG" ] && [ -n "$APP_ID" ]; then
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        else
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        fi

    # Rebase onto origin/main BEFORE the workspace cache key is computed.
    # Without this, hashFiles() reads the originally-checked-out bun.lock
    # and proto tree, but scripts/bootstrap.sh later rebases the workspace
    # onto main — so a "cache hit" can map to a tree that no longer matches
    # the cached node_modules (e.g. a release commit that added a new
    # @forwardimpact/* workspace package, leaving bun install skipped and
    # codegen unable to resolve common.proto). Doing the rebase here keys
    # the cache off the state we'll actually run against.
    - name: Sync workspace to origin/main
      shell: bash
      run: |
        set -euo pipefail
        if [ -f .git/shallow ]; then
          git fetch --unshallow origin
        fi
        git fetch origin main
        current_branch=$(git branch --show-current)
        if [ "$current_branch" = "main" ]; then
          git merge --ff-only origin/main
        else
          git branch -f main origin/main
          if git rebase main 2>/dev/null; then
            echo "Rebased '$current_branch' onto main."
          else
            git rebase --abort
            echo "Branch '$current_branch' has conflicts with main; cache key reflects pre-rebase state."
          fi
        fi

    - name: Checkout wiki
      if: inputs.token != ''
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.repository }}.wiki
        path: wiki
        token: ${{ inputs.token }}

    # One environment cache covers both the CLI tools and the workspace
    # (node_modules + generated). This step emits every path as one
    # newline-separated list: the paths install-deps.sh declares via --paths
    # (each tool's lib dir + bin symlink — keeping unrelated ~/.local tooling
    # like uv/Python out of the cache), plus the workspace dirs. Folding the
    # two former caches into a single restore drops an actions/cache
    # round-trip from the critical path. Layout is static, so the tool paths
    # are correct even on a cold cache before anything is installed.
    - name: Resolve cache paths
      id: cache-paths
      shell: bash
      run: |
        {
          echo "paths<<EOF"
          if grep -q -- '--paths' scripts/install-deps.sh; then
            bash scripts/install-deps.sh --paths
          else
            # Consumer's install-deps.sh predates the --paths contract: fall
            # back to caching the whole local install prefix (legacy behaviour).
            echo "$HOME/.local/bin"
            echo "$HOME/.local/lib"
          fi
          printf '%s\n' node_modules generated 'libraries/*/src/generated'
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Restore environment cache
      id: env-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.cache-paths.outputs.paths }}
        # Key on every input that changes what we install or generate:
        # install-deps.sh (tools), bun.lock (node_modules), and the proto +
        # libcodegen sources (generated). The env-v2 prefix forces one cold
        # rebuild so the cache is re-saved with the relative generated symlinks
        # fit-codegen now writes — older caches held absolute, non-portable
        # links that dangle once restored, defeating the codegen skip in
        # scripts/bootstrap.sh. restore-keys warm-starts from the previous
        # environment cache on a miss; cache-hit stays 'false' there, so
        # bootstrap.sh still runs bun install + codegen to reconcile.
        key: env-v2-${{ runner.os }}-${{ hashFiles('scripts/install-deps.sh', 'bun.lock', '**/*.proto', 'libraries/libcodegen/src/**', 'libraries/libcodegen/templates/**', 'libraries/libcodegen/bin/**') }}
        restore-keys: |
          env-v2-${{ runner.os }}-

    - name: Install CLI dependencies
      if: steps.env-cache.outputs.cache-hit != 'true'
      shell: bash
      run: bash scripts/install-deps.sh

    - name: Add deps to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Bootstrap
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BOOTSTRAP_WORKSPACE_CACHE_HIT: ${{ steps.env-cache.outputs.cache-hit }}
        # The Sync workspace step above already rebased onto origin/main; tell
        # bootstrap.sh to skip its own redundant fetch+rebase round-trip.
        BOOTSTRAP_SKIP_SYNC: "true"
      run: ./scripts/bootstrap.sh
